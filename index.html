<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Links</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100%;
      height: 100vh;
      background: #f5f1ed;
      overflow: hidden;
      user-select: none;
    }

    /* Aspect-ratio wrapper 1549 : 944 */
    .board {
      position: relative;
      width: 100%;
      padding-top: calc(944 / 1549 * 100%);
      overflow: hidden;
    }

    .board-inner {
      position: absolute;
      inset: 0;
    }

    .bg-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    /* DRAGGABLE LINK CARDS */
    .card {
      position: absolute;
      cursor: grab;
      z-index: 20;
      text-decoration: none;
      transition: filter 0.2s ease, transform 0.25s ease;
    }
    .card:not(.is-dragging):hover {
      filter: brightness(1.04) drop-shadow(0 10px 28px rgba(0,0,0,0.22));
    }
    .card.is-dragging {
      filter: drop-shadow(0 18px 44px rgba(0,0,0,0.28));
      cursor: grabbing;
    }
    .card img {
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    /* Tilt on hover - each card leans in its own direction */
    #card-resume:not(.is-dragging):hover   { transform: rotate(-4deg) translateY(-8px); }
    #card-behance:not(.is-dragging):hover  { transform: rotate(4deg)  translateY(-8px); }
    #card-linkedin:not(.is-dragging):hover { transform: rotate(-3deg) translateY(-6px); }

    /* Positions reduced to prevent overlapping the TV (at y=487 in 1549x944 canvas) */
    #card-resume  { left: 26.5%; top: 19.5%; width: 11.5%; }
    #card-behance { left: 68.5%; top: 19.5%; width: 11.2%; }
    #card-linkedin{ left: 47.5%; top: 26%;   width: 12.5%; }

    .hint {
      position: absolute;
      bottom: 2.5%;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(8px, 0.85vw, 13px);
      font-weight: 600;
      letter-spacing: 0.22em;
      color: #b8b0a8;
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: none;
      font-family: 'Inter', 'Roboto', sans-serif;
    }
  </style>
</head>
<body>

  <div class="board">
    <div class="board-inner">

      <img class="bg-img" src="assets/bg.png" alt="" draggable="false">

      <!-- RESUME CARD -->
      <a class="card" id="card-resume" data-rot="0"
         href="https://drive.google.com/drive/folders/14qrrc5bgkOEQmInGEp_mHTFLhEXX_IRE?usp=drive_link"
         target="_blank" rel="noopener noreferrer">
        <img src="assets/card-resume.svg" alt="Resume - Phuong Anh" draggable="false">
      </a>

      <!-- BEHANCE CARD -->
      <a class="card" id="card-behance" data-rot="0"
         href="https://www.behance.net/phphanh"
         target="_blank" rel="noopener noreferrer">
        <img src="assets/card-behance.svg" alt="Behance - phphanh" draggable="false">
      </a>

      <!-- LINKEDIN CARD -->
      <a class="card" id="card-linkedin" data-rot="0"
         href="https://www.linkedin.com/in/phphanh/"
         target="_blank" rel="noopener noreferrer">
        <img src="assets/card-linkedin.svg" alt="LinkedIn - Phuong Anh" draggable="false">
      </a>

      <span class="hint">Try moving things around :)</span>

    </div>
  </div>

  <script>
    let dragging = null, offsetX = 0, offsetY = 0, moved = false;

    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('mousedown', e => {
        if (e.button !== 0) return;
        const rect = card.getBoundingClientRect();
        card.style.left   = rect.left + 'px';
        card.style.top    = rect.top  + 'px';
        card.style.right  = 'auto';
        card.style.bottom = 'auto';
        dragging = card;
        moved    = false;
        offsetX  = e.clientX - rect.left;
        offsetY  = e.clientY - rect.top;
        card.style.zIndex = '999';
        card.classList.add('is-dragging');
        e.preventDefault();
      });
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      dragging.style.left = (e.clientX - offsetX) + 'px';
      dragging.style.top  = (e.clientY - offsetY) + 'px';
      moved = true;
    });

    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging.style.zIndex = '20';
      dragging.style.transform = '';
      dragging.classList.remove('is-dragging');
      if (moved) {
        const card = dragging;
        const block = ev => {
          ev.preventDefault();
          ev.stopPropagation();
          card.removeEventListener('click', block, true);
        };
        card.addEventListener('click', block, true);
      }
      dragging = null;
    });

    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('touchstart', e => {
        const t = e.touches[0];
        const rect = card.getBoundingClientRect();
        card.style.left   = rect.left + 'px';
        card.style.top    = rect.top  + 'px';
        card.style.right  = 'auto';
        card.style.bottom = 'auto';
        dragging = card;
        moved    = false;
        offsetX  = t.clientX - rect.left;
        offsetY  = t.clientY - rect.top;
        card.style.zIndex = '999';
        card.classList.add('is-dragging');
      }, { passive: true });
    });

    document.addEventListener('touchmove', e => {
      if (!dragging) return;
      e.preventDefault();
      const t = e.touches[0];
      dragging.style.left = (t.clientX - offsetX) + 'px';
      dragging.style.top  = (t.clientY - offsetY) + 'px';
      moved = true;
    }, { passive: false });

    document.addEventListener('touchend', () => {
      if (dragging) {
        dragging.style.zIndex = '20';
        dragging.style.transform = '';
        dragging.classList.remove('is-dragging');
        dragging = null;
      }
    });
  </script>
</body>
</html>
