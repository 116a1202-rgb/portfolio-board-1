  <script>
    let dragging=null,offsetX=0,offsetY=0,moved=false;
    document.querySelectorAll('.card').forEach(card=>{
      card.addEventListener('mousedown',e=>{
        if(e.button!==0)return;
        const rect=card.getBoundingClientRect();
        card.style.left=rect.left+'px'; card.style.top=rect.top+'px';
        card.style.right='auto'; card.style.bottom='auto';
        dragging=card; moved=false;
        offsetX=e.clientX-rect.left; offsetY=e.clientY-rect.top;
        card.style.zIndex='999'; card.classList.add('is-dragging');
        e.preventDefault();
      });
    });
    document.addEventListener('mousemove',e=>{
      if(!dragging)return;
      dragging.style.left=(e.clientX-offsetX)+'px';
      dragging.style.top=(e.clientY-offsetY)+'px';
      moved=true;
    });
    document.addEventListener('mouseup',()=>{
      if(!dragging)return;
      dragging.style.zIndex='20'; dragging.style.transform='';
      dragging.classList.remove('is-dragging');
      if(moved){
        const card=dragging;
        const block=ev=>{ev.preventDefault();ev.stopPropagation();card.removeEventListener('click',block,true);};
        card.addEventListener('click',block,true);
      }
      dragging=null;
    });
    document.querySelectorAll('.card').forEach(card=>{
      card.addEventListener('touchstart',e=>{
        const t=e.touches[0];
        const rect=card.getBoundingClientRect();
        card.style.left=rect.left+'px'; card.style.top=rect.top+'px';
        card.style.right='auto'; card.style.bottom='auto';
        dragging=card; moved=false;
        offsetX=t.clientX-rect.left; offsetY=t.clientY-rect.top;
        card.style.zIndex='999'; card.classList.add('is-dragging');
      },{passive:true});
    });
    document.addEventListener('touchmove',e=>{
      if(!dragging)return;
      e.preventDefault();
      const t=e.touches[0];
      dragging.style.left=(t.clientX-offsetX)+'px';
      dragging.style.top=(t.clientY-offsetY)+'px';
      moved=true;
    },{passive:false});
    document.addEventListener('touchend',()=>{
      if(dragging){dragging.style.zIndex='20';dragging.style.transform='';dragging.classList.remove('is-dragging');dragging=null;}
    });
  </script>
